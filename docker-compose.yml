version: '3.8'

services:
  api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
      - LANGSMITH_TRACING=true
      - LANGSMITH_PROJECT=agentic-rag
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped

  cli:
    build: .
    command: python cli/agentic_chatbot.py
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
    env_file:
      - .env
    volumes:
      - ./data:/app/data

  # Optional: Streamlit UI
  streamlit:
    build: .
    ports:
      - "8501:8501"
    command: streamlit run rag_tutorial/streamlit_app.py
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - LANGSMITH_API_KEY=${LANGSMITH_API_KEY}
    env_file:
      - .env
    volumes:
      - ./data:/app/data